<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{width:320px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f11;color:#e8e8ef;margin:0;padding:12px;font-size:12px}
h2{font-size:13px;font-weight:600;color:#7c6aff;margin:0 0 10px;display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;background:#5a5a70}
.dot.ok{background:#22c55e}.dot.er{background:#ef4444}
p{color:#9898aa;font-size:11px;line-height:1.6;margin:0 0 12px}
.btn{width:100%;padding:9px;background:#7c6aff;color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:6px}
.btn:hover{background:#5b4de8}
.btn svg{width:14px;height:14px}
.note{font-size:10px;color:#5a5a70;text-align:center;line-height:1.6}
</style>
</head>
<body>
<h2><span class="dot" id="dot"></span>UI Inspector</h2>
<p id="msg">Checking current tab…</p>
<button class="btn" id="openbtn" style="display:none">
  <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="12" height="12" rx="2"/><path d="M5 1V13" stroke-linecap="round"/></svg>
  Open Inspector Panel
</button>
<p class="note" id="note"></p>
<script src="popup.js"></script>
</body>
</html>
